# ?? Development profile (invinciblebots.dev) ??????????????????????????????????
# Activate with: java -jar seek.jar --spring.profiles.active=dev
#            or: SPRING_PROFILES_ACTIVE=dev java -jar seek.jar
#
# Overrides only the values that differ from application.properties defaults.
# Uses SECRETSFREE bootstrap ? admin must upload thiravucoal.json after deploy.

# Bootstrap Mode: SECRETSFREE for deployed environments
seek.bootstrap.mode=secretsfree

# App public URL ? used in verification email links and passkey rpId
seek.auth.base-url=https://invinciblebots.dev

# CORS: allow the dev frontend origin
seek.cors.allowed-origins=https://invinciblebots.dev,https://api.invinciblebots.dev

# Logging: more verbose in dev
logging.level.com.nlp.rag.seek=DEBUG

