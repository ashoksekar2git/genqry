# ??????????????????????????????????????????????????????????????????????????????
# SEEK ? Cloud Profile (activate with: --spring.profiles.active=cloud)
#
# ALL SECRETS ARE EMPTY ? the app starts in standby mode.
# An admin must visit the hidden bootstrap page, upload thiravucoal.json,
# and trigger initialization before the app becomes operational.
# ??????????????????????????????????????????????????????????????????????????????

# ?? Bootstrap mode ????????????????????????????????????????????????????????????
seek.bootstrap.mode=cloud

# ?? Database credentials ? intentionally EMPTY ????????????????????????????????
spring.datasource.primary.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/seek?connectTimeout=3&socketTimeout=10
spring.datasource.primary.username=${DB_USERNAME:postgres}
spring.datasource.primary.password=
spring.datasource.primary.driver-class-name=org.postgresql.Driver

spring.datasource.secondary.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ecommerce?connectTimeout=3&socketTimeout=10
spring.datasource.secondary.username=${DB_USERNAME:postgres}
spring.datasource.secondary.password=
spring.datasource.secondary.driver-class-name=org.postgresql.Driver

# ?? OpenAI ? intentionally EMPTY ?????????????????????????????????????????????
spring.ai.openai.api-key=NOT_SET

# ?? JWT ? intentionally EMPTY (temporary random key at startup) ???????????????
seek.jwt.secret=

# ?? Fernet ? intentionally EMPTY (temporary random key at startup) ????????????
seek.auth.fernet.key=

# ?? SMTP ? intentionally EMPTY ???????????????????????????????????????????????
spring.mail.password=
spring.mail.username=
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# ?? CORS ? restrict to your domain ???????????????????????????????????????????
seek.cors.allowed-origins=${CORS_ORIGINS:https://seekingbots.com}

# ?? Server port (can be overridden by env var) ????????????????????????????????
server.port=${PORT:9095}

