# ==============================================================================
# genQry - Cloud Profile (DEPRECATED - use 'secretsfree' profile instead)
# ==============================================================================
# This profile is kept for backward compatibility only.
# Activate with: SPRING_PROFILES_ACTIVE=cloud
# Preferred:     SPRING_PROFILES_ACTIVE=secretsfree
#
# Behavior is identical to secretsfree mode:
# App starts credential-free. Admin must upload thiravucoal.json and trigger init.
# ==============================================================================
# Bootstrap Mode: SECRETSFREE
genqry.bootstrap.mode=secretsfree
# CORS - restrict to your domain
genqry.cors.allowed-origins=${CORS_ORIGINS:https://genqry.com}
# Server port (can be overridden by env var)
server.port=${PORT:9095}
