spring.application.name=genQry
server.port=9095

# ??????????????????????????????????????????????????????????????????????????????
# genQry ? Base Configuration
# ??????????????????????????????????????????????????????????????????????????????
# This file is safe to check into GitHub ? NO real credentials are stored here.
#
# TWO MODES:
#   LOCAL       ? application-local.properties overrides credentials with real
#                  values. SecretStore marks initialized immediately. No 503.
#                  Run with: SPRING_PROFILES_ACTIVE=local (default)
#
#   SECRETSFREE ? App starts credential-free. All API endpoints return 503
#                  until admin uploads thiravucoal.json via hidden bootstrap page.
#                  Run with: SPRING_PROFILES_ACTIVE=secretsfree
#                  Or set no profile (deployed environments use this base file).
# ??????????????????????????????????????????????????????????????????????????????

# ?? Active Profile ????????????????????????????????????????????????????????????
# Default: local (localhost development with credentials in application-local.properties)
# Override with env var SPRING_PROFILES_ACTIVE=secretsfree|dev|prod for other environments
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ?? Bootstrap Mode ????????????????????????????????????????????????????????????
# local       = credentials from application-local.properties; app is ready immediately
# secretsfree = app starts credential-free; returns 503 until secrets bootstrapped
genqry.bootstrap.mode=${BOOTSTRAP_MODE:secretsfree}

# ?? OpenAI ????????????????????????????????????????????????????????????????????
spring.ai.openai.api-key=${OPENAI_API_KEY:NOT_SET}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Disable Spring AI retry ? fail fast on bad key; no 5-attempt wait at startup
spring.ai.retry.max-attempts=1
spring.ai.retry.on-client-errors=false

# ?? RAG chunking ??????????????????????????????????????????????????????????????
# chunkSize: max words per chunk | stride: advance step | overlap = chunkSize-stride
rag.chunking.chunk-size=80
rag.chunking.stride=40

# ?? Datasource: disable Spring Boot auto-config (we manage both manually) ?????
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ?? PRIMARY datasource: PostgreSQL → genQry DB ??????????????????????????????????
spring.datasource.primary.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/genqry?connectTimeout=3&socketTimeout=10
spring.datasource.primary.username=${DB_USERNAME:NOT_SET}
spring.datasource.primary.password=${DB_PASSWORD:}
spring.datasource.primary.driver-class-name=org.postgresql.Driver

# ?? SECONDARY datasource: PostgreSQL ? ecommerce DB ??????????????????????????
spring.datasource.secondary.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ecommerce?connectTimeout=3&socketTimeout=10
spring.datasource.secondary.username=${DB_USERNAME:NOT_SET}
spring.datasource.secondary.password=${DB_PASSWORD:}
spring.datasource.secondary.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

# ?? Supporting files directory ????????????????????????????????????????????????
genqry.supporting-files.dir=src/main/resources/supportingFiles

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.nlp.rag.seek=DEBUG
logging.level.org.springframework.ai=WARN

# ?? Redis ? Semantic Query Cache ??????????????????????????????????????????????
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# Semantic cache settings
cache.semantic.enabled=true
cache.semantic.similarity-threshold=0.97
cache.semantic.ttl-seconds=3600
cache.semantic.key-prefix=genqry:cache:
cache.semantic.max-scan=500

# ?? SQL Execution (live query runner) ?????????????????????????????????????????
sql.execution.row-limit=50
sql.execution.timeout-seconds=10

# ?? Schema Enrichment ? abbreviated table/column name expansion ???????????????
genqry.schema.enrichment.enabled=true
genqry.schema.enrichment.strategy=AUTO

# ?? Schema Metadata API ???????????????????????????????????????????????????????
genqry.metadata.default-page-size=10

# ?? SQL File Upload ???????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=5MB
genqry.upload.max-file-size-mb=1

# ?? Spring Mail (SMTP) ? intentionally NOT_SET ????????????????????????????????
genqry.auth.mail.enabled=${MAIL_ENABLED:true}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:NOT_SET}
spring.mail.password=${SMTP_PASS:NOT_SET}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false

genqry.auth.mail.from=${SMTP_FROM:genQry <ragdataseek@gmail.com>}

# ?? Base URL (verification email links, passkey rpId) ?????????????????????????
genqry.auth.base-url=${NEXT_PUBLIC_APP_URL:http://localhost:3000}

# ?? Verification token TTL ????????????????????????????????????????????????????
genqry.auth.token.ttl-hours=24

# ?? Passkey / WebAuthn ????????????????????????????????????????????????????????
genqry.auth.passkey.rp-name=${PASSKEY_RP_NAME:genQry NL2SQL}

# ?? Fernet Encryption Key ? intentionally NOT_SET ?????????????????????????????
genqry.auth.fernet.key=${FERNET_KEY:}

# ?? Document RAG ??????????????????????????????????????????????????????????????
genqry.doc-rag.chunk-size=120
genqry.doc-rag.stride=60
genqry.pdf.max-words-per-chunk=150
genqry.doc-rag.hybrid-alpha=0.6

# ?? JWT Authentication ? intentionally NOT_SET ????????????????????????????????
genqry.jwt.secret=${JWT_SECRET:}
genqry.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ?? SpringDoc / Swagger UI ????????????????????????????????????????????????????
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

# ?? Safari browser related settings ??????????????????????????????????????????
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
