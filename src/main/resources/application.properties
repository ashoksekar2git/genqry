spring.application.name=seek
server.port=9095

# ?? Bootstrap Mode ????????????????????????????????????????????????????????????
# local  = credentials from this file (default, for development)
# cloud  = app starts credential-free; admin must upload secrets via hidden page
seek.bootstrap.mode=${BOOTSTRAP_MODE:local}

# ?? OpenAI ????????????????????????????????????????????????????????????????????
# Set OPENAI_API_KEY env variable before running (real key enables semantic search)
spring.ai.openai.api-key=${OPENAI_API_KEY:NOT_SET}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.0
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Disable Spring AI retry ? fail fast on bad key; no 5-attempt wait at startup
spring.ai.retry.max-attempts=1
spring.ai.retry.on-client-errors=false

# ?? RAG chunking ??????????????????????????????????????????????????????????????
# chunkSize: max words per chunk | stride: advance step | overlap = chunkSize-stride
rag.chunking.chunk-size=80
rag.chunking.stride=40

# ?? Datasource: disable Spring Boot auto-config (we manage both manually) ?????
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ?? PRIMARY datasource: PostgreSQL ????????????????????????????????????????????
# connectTimeout=3  ? fail fast after 3s if PG is unreachable
# socketTimeout=10  ? kill any query that takes longer than 10s
spring.datasource.primary.url=jdbc:postgresql://localhost:5432/seek?connectTimeout=3&socketTimeout=10
spring.datasource.primary.username=postgres
spring.datasource.primary.password=root
spring.datasource.primary.driver-class-name=org.postgresql.Driver


spring.datasource.secondary.url=jdbc:postgresql://localhost:5432/ecommerce?connectTimeout=3&socketTimeout=10
spring.datasource.secondary.username=postgres
spring.datasource.secondary.password=root
spring.datasource.secondary.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

# ?? Supporting files directory (used for writing BusinessRulesForPrompts.json, etc.) ??
seek.supporting-files.dir=src/main/resources/supportingFiles

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.root=WARN
logging.level.com.nlp.rag.seek=DEBUG
logging.level.org.springframework.ai=WARN
#./mvnw clean package -DskipTests 2>&1 | tail -10
# ?? Redis ? Semantic Query Cache ??????????????????????????????????????????????
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=2000ms

# Semantic cache settings
cache.semantic.enabled=true
# Cosine similarity threshold: 0.0=anything matches, 1.0=exact match only
# 0.97 = only hit when queries are near-identical phrasings (prevents wrong
# cache hits when filter values differ, e.g. "ARTS" vs "ARTS and Science")
cache.semantic.similarity-threshold=0.97
# TTL in seconds (default 1 hour). Set to 0 to disable expiry.
cache.semantic.ttl-seconds=3600
# Redis key prefix for all cache entries
cache.semantic.key-prefix=seek:cache:
# Max entries to scan during similarity search (protect against huge caches)
cache.semantic.max-scan=500

# ?? SQL Execution (live query runner) ?????????????????????????????????????????
sql.execution.row-limit=50
sql.execution.timeout-seconds=10

# ?? Schema Enrichment ? Abbreviated table/column name expansion ???????????????
# Automatically expands abbreviated names (emp_dtls ? employee details)
# so the embedding model and keyword fallback work correctly.
#
# Strategy:  AUTO   = enrich only abbreviated names (recommended)
#            ALWAYS = enrich everything
#            NEVER  = disable
seek.schema.enrichment.enabled=true
seek.schema.enrichment.strategy=AUTO

# Custom domain-specific abbreviations ? add as many as needed:
# seek.schema.abbreviations.shpmnt=shipment
# seek.schema.abbreviations.smrtpst=smartpost
# seek.schema.abbreviations.dlvry=delivery
# seek.schema.abbreviations.pkgwt=package weight
# seek.schema.abbreviations.trkng=tracking

# ?? Schema Metadata API ????????????????????????????????????????????????????????
# Max tables returned per page ? hard capped at 10 in SchemaMetadataService
seek.metadata.default-page-size=10
#logging.level.org.postgresql=TRACE

# ?? SQL File Upload ????????????????????????????????????????????????????????????
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=5MB

# Global file upload size limit (MB) ? enforced by backend controllers.
# Change this single value to update the limit across all upload endpoints.
seek.upload.max-file-size-mb=1


# ?? Spring Mail (SMTP) ????????????????????????????????????????????????????????
# Set these environment variables before running:
#   SMTP_HOST  (default: smtp.gmail.com)
#   SMTP_PORT  (default: 587)
#   SMTP_USER  (default: ragdataseek@gmail.com)
#   SMTP_PASS  *** MUST BE A GMAIL APP PASSWORD (16 chars, no spaces) ***
#              NOT your regular Gmail password.
#              Generate at: https://myaccount.google.com/apppasswords
#              Steps:
#                1. Go to https://myaccount.google.com/security
#                2. Enable 2-Step Verification (required)
#                3. Go to https://myaccount.google.com/apppasswords
#                4. App name: "SEEK NL2SQL"  ? click Generate
#                5. Copy the 16-char password (e.g. abcd efgh ijkl mnop)
#                6. Set SMTP_PASS=abcdefghijklmnop  (no spaces)
#   SMTP_FROM  (default: SEEK NL2SQL <ragdataseek@gmail.com>)
# Set seek.auth.mail.enabled=false to disable email sending without removing the dependency
seek.auth.mail.enabled=${MAIL_ENABLED:true}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:ragdataseek@gmail.com}
spring.mail.password=${SMTP_PASS:ysctbkiqxnlihhcm}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8
# Do NOT test the SMTP connection at startup ? fail only when an email is actually sent
spring.mail.test-connection=false

# From address shown in the verification email
seek.auth.mail.from=${SMTP_FROM:SEEK <ragdataseek@gmail.com>}

# Base URL used to build the verification link  (no trailing slash)
# Tiers:
#   Local machine : http://localhost:3000        (override via NEXT_PUBLIC_APP_URL)
#   Development   : https://invinciblebots.dev   (set NEXT_PUBLIC_APP_URL=https://invinciblebots.dev)
#   Production    : https://invinciblebots.com   (set NEXT_PUBLIC_APP_URL=https://invinciblebots.com)
seek.auth.base-url=${NEXT_PUBLIC_APP_URL:http://localhost:3000}

# Verification token TTL in hours
seek.auth.token.ttl-hours=24

# ?? Passkey / WebAuthn ????????????????????????????????????????????????????????
# Relying Party display name shown in the browser passkey dialog
# Development domain : invinciblebots.dev
# Production domain  : invinciblebots.com
seek.auth.passkey.rp-name=${PASSKEY_RP_NAME:SEEK NL2SQL}

# ?? Fernet Encryption Key (AES-128-CBC + HMAC-SHA256) ??????????????????????????????????
# 32-byte URL-safe Base64 key used to encrypt stored passwords.
# Leave blank on first run ? a random key will be generated and logged.
# Copy the logged key here to persist it across restarts.
# Generate manually: FernetEncryptionService.generateKeyBase64()
seek.auth.fernet.key=gtV07fFdlNw2MYgpPWH6NEH_HiwHTtB_mvrXJ7j-t9E

# ?? Document RAG ??????????????????????????????????????????????????????????????
# Sliding-window chunk size (words per chunk) ? used for non-PDF documents
seek.doc-rag.chunk-size=120
# Stride between consecutive chunks (words to advance; overlap = chunk-size - stride)
seek.doc-rag.stride=60
# PDF structural chunking: max words per section chunk before splitting (with 30-word overlap)
seek.pdf.max-words-per-chunk=150
# Hybrid search alpha: weight for cosine similarity vs keyword TF scoring (0.0=keyword-only, 1.0=semantic-only)
# 0.6 gives semantic search the majority while ensuring financial/numeric keyword terms are never missed
seek.doc-rag.hybrid-alpha=0.6

# ?? JWT Authentication ????????????????????????????????????????????????????????
# Base64-encoded >=256-bit HMAC-SHA key. Override via JWT_SECRET env variable.
# NEVER commit a production key. Generate with: openssl rand -base64 32
seek.jwt.secret=${JWT_SECRET:c2VlazEyM1N1cGVyU2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb24=}
# Token expiration in milliseconds (default: 24 hours = 86400000)
seek.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ?? SpringDoc / Swagger UI ????????????????????????????????????????????????????
# API docs at: http://localhost:9095/v3/api-docs
# Swagger UI : http://localhost:9095/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

#safari browser related settings
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true

