# ?? Production profile (genqry.com) ???????????????????????????????????
# Activate with: java -jar genQry.jar --spring.profiles.active=prod
#            or: SPRING_PROFILES_ACTIVE=prod java -jar genQry.jar
#
# Overrides only the values that differ from application.properties defaults.
# Uses SECRETSFREE bootstrap ? admin must upload thiravucoal.json after deploy.

# Bootstrap Mode: SECRETSFREE for deployed environments
genqry.bootstrap.mode=secretsfree

# App public URL ? used in verification email links and passkey rpId
genqry.auth.base-url=https://genqry.com

# CORS: allow production frontend origins (both www and non-www)
genqry.cors.allowed-origins=https://genqry.com,https://www.genqry.com

# Logging: suppress debug noise in production
logging.level.com.nlp.rag.seek=INFO
logging.level.root=WARN

