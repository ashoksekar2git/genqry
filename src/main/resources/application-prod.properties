# Activate with: java -jar seek.jar --spring.profiles.active=prod
#            or: SPRING_PROFILES_ACTIVE=prod java -jar seek.jar
#
# Overrides only the values that differ from application.properties defaults.

# App public URL ? used in verification email links and passkey rpId
seek.auth.base-url=https://invinciblebots.com

# CORS: allow only the production frontend origin
seek.cors.allowed-origins=https://invinciblebots.com,https://api.invinciblebots.com

# Logging: suppress debug noise in production
logging.level.com.nlp.rag.seek=INFO
logging.level.root=WARN

